name: svg_animated_ftl
description: Aplicación móvil para animar archivos SVG
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  provider: ^6.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.0.0
  uuid: ^4.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  xml: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/example.svg
    - assets/car_animated.svg
    - assets/car_animated_01.svg
    - assets/car_animated_04.svg
